language = "C"
header = """/*
 * nirs4all-formats C ABI header.
 *
 * Generated by cbindgen; do not edit by hand. Refresh with:
 *   cargo build -p nirs4all-formats-capi
 *
 * The committed copy under crates/nirs4all-formats-capi/include/nirs4all_formats.h
 * mirrors the latest build so downstream packagers can pin the header
 * without running cargo.
 */"""
include_guard = "NIRS4ALL_FORMATS_H"
autogen_warning = "/* This file is auto-generated by cbindgen. */"
include_version = true
documentation = true
documentation_style = "c99"
trailer = ""

[parse]
parse_deps = false
clean = false

[export]
prefix = "n4fmt_"
item_types = ["constants", "functions", "structs", "enums", "opaque", "typedefs"]
exclude = []

[defines]
"target_family = unix" = "N4FMT_UNIX"
"target_family = windows" = "N4FMT_WINDOWS"

[fn]
prefix = ""
postfix = ""
args = "vertical"
must_use = "N4FMT_MUST_USE"

[struct]
derive_eq = false
