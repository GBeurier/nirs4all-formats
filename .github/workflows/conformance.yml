name: Conformance

on:
  schedule:
    - cron: "19 3 * * 1"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  reference-readers:
    name: Reference-reader conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: r-lib/actions/setup-r@v2

      - name: Install Python reference readers
        run: |
          python -m pip install --upgrade pip
          python -m pip install setuptools
          python -m pip install --no-build-isolation spc-spectra
          python -m pip install -r tests/conformance/requirements.txt

      - name: Install R spectrolab reference reader
        run: |
          Rscript -e 'install.packages(c("spectrolab", "jsonlite"), repos="https://cloud.r-project.org", quiet=TRUE)'

      - name: Build nirs4all-formats Python binding
        run: |
          python -m pip install maturin
          (cd bindings/python && maturin develop --release --quiet)

      - name: Run conformance suite
        run: |
          python -m pytest -m conformance tests/conformance/ -ra
